<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Planning Eloi — Pointage &amp; calculs</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#2563eb" />
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Planning Eloi" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>Planning Eloi</h1>
      <p class="subtitle">Pointage des heures &amp; calcul de la rémunération</p>
    </div>

    <div class="controls">
      <label class="control">
        <span>Année</span>
        <select id="year-select"></select>
      </label>

      <label class="control">
        <span>Taux horaire (€)</span>
        <input id="rate-input" type="number" min="0" step="0.01" value="2.66" />
      </label>

      <div class="control actions">
        <button id="export-btn" type="button" title="Exporter le mois affiché en CSV">Exporter CSV</button>
        <button id="reset-btn" type="button" class="danger" title="Effacer les saisies de l'année affichée">Réinitialiser l'année</button>
      </div>
    </div>
  </header>

  <nav class="tabs" id="tabs" aria-label="Onglets des mois"></nav>

  <main id="content"></main>

  <footer class="app-footer">
    <span>Les données sont enregistrées automatiquement dans ce navigateur.</span>
  </footer>

  <script src="app.js"></script>
  <script>
    // Enregistrement du service worker (PWA / hors-ligne)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((e) => console.warn('SW non enregistré :', e));
      });
    }
  </script>
</body>
</html>
